<html> 
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial scale=1.0">
        <title>{{data.titulo}}</title> <!--Hace referencia a lo que pusimos en python
        data que es la variable y titulo que es el dato que estamos pasando-->
    </head>
    <body>
        <h1>{{data.saludo}}</h1>
        {%if data.numero_curso > 0 %}
        <ul>
            {% for c in data.cursos %}
                <li>{{ c }}</li>
            {% endfor %}
        </ul>
        {%else%}
        <h2>No existen cursos</h2>
        {% endif %}
    </body>
</html>
